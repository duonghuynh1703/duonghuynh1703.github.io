<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>title.html</title>
<style type="text/css">
/* Xóa bỏ khoảng trắng mặc định của trình duyệt */
html, body {
    margin: 0;
    padding: 0;
    background-color: #ffffff;
}

body, td, th {
    font-size: 24px;
    color: #010101;
    font-family: sans-serif;
}

/* Định dạng riêng cho ảnh GIF bên trái để phủ kín và cân xứng */
.gif-left {
    display: block;
    width: 100%;
    height: 150px;
    object-fit: cover; /* Ép ảnh phủ kín 100% diện tích ô, không bị khoảng đen */
}

/* Định dạng riêng cho cây búa bên phải */
.bua-right {
    display: block;
    height: 130px; /* Thu nhỏ một chút để vừa vặn, không chạm viền */
    width: auto;
    margin: 0 auto;
}
</style>
</head>

<body>
<table width="100%" height="150" border="0" cellspacing="0" cellpadding="0" style="table-layout: fixed;">
  <tbody>
    <tr>
      <td width="20%" height="150" align="center" valign="middle" style="overflow: hidden;">
          <img src="ảnh/፧ 𝐁𝐥𝐚𝐜𝐤𝐩𝐢𝐧𝐤 𝐆𝐈𝐅.gif" class="gif-left" alt="Blackpink GIF"/>
      </td>
      
      <td width="60%" height="150" align="center" valign="middle" bgcolor="#F846E1">
          <p style="margin: 5px 0;"><strong>Đặng Thị Thùy Dương</strong></p>
          <p style="margin: 5px 0;"><strong>CN24CD</strong></p>
      </td>
      
      <td width="20%" height="150" align="center" valign="middle" bgcolor="#FFFFFF">
          <img src="ảnh/cay bua.jpg" class="bua-right" alt="Búa Blackpink"/>
      </td>
    </tr>
  </tbody>
</table>
</body>
</html>
