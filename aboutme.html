<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>About Me - Footer</title>
<style type="text/css">
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        /* Nền tối sâu thẳm đồng bộ với khung sườn của website */
        background-color: #0b0c10;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        padding: 8px 10px;
        overflow: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh; /* Đảm bảo căn giữa tuyệt đối theo chiều dọc */
    }

    /* --- Khung Chân Trang Đổ Bóng Loang Màu --- */
    .footer-container {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 100%;
        height: 50px; /* Chiều cao thon gọn chuẩn footer */
        
        /* Hiệu ứng loang màu chuyển sắc mượt mà từ Đen Tím sang Hồng Neon rực rỡ */
        background: linear-gradient(90deg, #1f0516 0%, #3a0025 50%, #ff1493 100%);
        
        /* Bo góc nhẹ và tạo đường viền mờ ảo phong cách kính */
        border-radius: 10px;
        border: 1px solid rgba(255, 20, 147, 0.25);
        
        /* Đổ bóng phát sáng (Neon Glow) tràn viền */
        box-shadow: 0 4px 15px rgba(255, 20, 147, 0.25),
                    inset 0 0 10px rgba(248, 70, 225, 0.1);
    }

    /* --- Hiệu ứng chữ Blink Blink phát sáng --- */
    .blink-text {
        color: #ffffff;
        font-size: 1.1rem;
        font-weight: 700;
        letter-spacing: 4px; /* Giãn chữ tạo phong cách điện ảnh cao cấp */
        text-transform: uppercase; /* Viết hoa sang trọng */
        
        /* Đổ bóng chữ nhiều lớp giúp text rực sáng trên nền tối */
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.6), 
                     0 0 15px rgba(255, 20, 147, 0.8);
        
        /* Hiệu ứng chuyển động nhịp thở nhẹ nhàng cho chữ (Tùy chọn thẩm mỹ) */
        animation: pulse 3s infinite alternate;
    }

    @keyframes pulse {
        0% {
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.6), 0 0 15px rgba(255, 20, 147, 0.8);
            transform: scale(1);
        }
        100% {
            text-shadow: 0 0 12px rgba(255, 255, 255, 0.8), 0 0 25px rgba(255, 20, 147, 1);
            transform: scale(1.02);
        }
    }
</style>
</head>

<body>

<div class="footer-container">
    <div class="blink-text">Blink Blink</div>
</div>

</body>
</html>
