<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>Bài 6 - Thông báo thời gian tự động</title>
    <style type="text/css">
        /* Thiết lập nền loang màu Đen mix Hồng cực đẹp */
        body {
            background: radial-gradient(circle at center, #2d0b23 0%, #12030e 50%, #000000 100%);
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* Khung hiển thị thông báo thời gian tự động */
        .time-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(229, 127, 236, 0.2);
            padding: 25px 40px;
            border-radius: 16px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            font-size: 24px;
            font-weight: bold;
        }

        /* Định dạng hiển thị phần ngày tháng */
        #ngay {
            color: #ffffff;
        }

        /* Định dạng đồng hồ chạy tự động phát sáng */
        #dong-ho {
            color: #E57FEC;
            font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 10px rgba(229, 127, 236, 0.8), 
                         0 0 20px rgba(229, 127, 236, 0.4);
            margin-left: 8px;
        }
    </style>
</head>

<body>
    <div class="time-box">
        <span id="ngay"></span>, <span id="dong-ho">00:00:00</span>
    </div>

<script>
    function hienThiNgay(){
        var d = new Date();
        var dd = d.getDate();
        var mm = d.getMonth() + 1;
        var yyyy = d.getFullYear();
        document.getElementById('ngay').innerHTML = "Hôm nay, ngày " + dd + " tháng " + mm + " năm " + yyyy;
    }
    hienThiNgay();

    function capNhatDongHo() {
        const bayGio = new Date();
        // Định dạng thời gian theo chuẩn Việt Nam (HH:mm:ss)
        const chuoiThoiGian = bayGio.toLocaleTimeString('vi-VN');
        // Ghi vào thẻ div/span
        document.getElementById('dong-ho').innerText = chuoiThoiGian;
    }
    // Chạy ngay lần đầu tiên để tránh bị trễ 1 giây
    capNhatDongHo();

    // Chạy lặp lại sau mỗi 1 giây
    setInterval(capNhatDongHo, 1000);
</script>
</body>
</html>
