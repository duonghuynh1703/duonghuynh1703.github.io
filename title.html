<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>title.html</title>
<style type="text/css">
/* Ép toàn bộ nền dải tiêu đề thành màu hồng, xóa sạch rìa trắng cứng đầu */
html, body {
    margin: 0;
    padding: 0;
    background-color: #F846E1 !important; /* Màu hồng chủ đạo của bạn */
    overflow: hidden;
}

body, td, th {
    font-size: 24px;
    color: #010101;
    font-family: sans-serif;
}

/* Ảnh GIF bên trái: Phóng to phủ kín chiều cao, tự co dãn khít dải hồng */
.gif-left {
    display: block;
    width: 100%;
    height: 143px; 
    object-fit: fill; /* Ép ảnh căng tràn lấp đầy toàn bộ ô không để lại một kẽ hở nào */
}

/* Cây búa bên phải: Thu nhỏ vừa vặn, giữ nền trong suốt hoặc hòa vào nền hồng */
.bua-right {
    display: block;
    height: 120px; /* Cho nhỏ lại tí để không chạm viền */
    width: auto;
    margin: 0 auto;
}
</style>
</head>

<body>
<!-- Ép bảng tràn 100% màn hình và đổ toàn bộ màu nền là hồng để lấp khoảng trắng -->
<table width="100%" height="143" border="0" cellspacing="0" cellpadding="0" bgcolor="#F846E1" style="table-layout: fixed;">
  <tbody>
    <tr>
      <!-- Ô 1: Ảnh GIF bên trái (Chiếm 20% chiều rộng) -->
      <td width="15%" height="143" align="left" valign="top">
          <img src="ảnh/፧ 𝐁𝐥𝐚𝐜𝐤𝐩𝐢𝐧𝐤 𝐆𝐈𝐅.gif" class="gif-left" alt="Blackpink GIF"/>
      </td>
      
      <!-- Ô 2: Phần chữ ở giữa (Chiếm 60% chiều rộng) -->
      <td width="60%" height="143" align="center" valign="middle" bgcolor="#F846E1">
          <p style="margin: 5px 0;"><strong>Đặng Thị Thùy Dương</strong></p>
          <p style="margin: 5px 0;"><strong>CN24CD</strong></p>
      </td>
      
      <!-- Ô 3: Cây búa bên phải (Chiếm 20% chiều rộng) - Đã đổi bgcolor thành màu hồng luôn -->
      <td width="20%" height="143" align="center" valign="middle" bgcolor="#F846E1">
          <img src="ảnh/cay bua.jpg" class="bua-right" alt="Búa Blackpink"/>
      </td>
    </tr>
  </tbody>
</table>
</body>
</html>
