<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
<style type="text/css">
    body {
        background: #000000; /* Mặc định ban đầu là màu đen */
        transition: background-color 0.5s ease; /* Thêm hiệu ứng loang/chuyển màu mượt mà */
    }
</style>
</head>

<body>
<script>
    function doiMauTheoGiay() {
        // Lấy giá trị giây hiện tại (từ 0 đến 59)
        var giay = new Date().getSeconds();
        
        // Kiểm tra điều kiện chẵn lẻ bằng phép chia lấy dư
        if (giay % 2 === 0) {
            // Giây chẵn -> Đổi sang màu đen
            document.body.style.backgroundColor = "#000000";
        } else {
            // Giây lẻ -> Đổi sang màu hồng
            document.body.style.backgroundColor = "#E57FEC";
        }
    }

    // Gọi hàm ngay lập tức khi vừa tải trang để set màu chính xác
    doiMauTheoGiay();

    // Thiết lập vòng lặp để tự động chạy lại hàm sau mỗi 1000 mili-giây (1 giây)
    setInterval(doiMauTheoGiay, 1000);
</script>
</body>
</html>
